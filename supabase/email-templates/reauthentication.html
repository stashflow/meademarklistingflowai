<div style="margin:0;background:#0B0D10;padding:28px;font-family:Inter,Arial,sans-serif;color:#F8FAFC;">
  <div style="margin:0 auto;max-width:520px;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:#11141A;overflow:hidden;">
    <div style="height:4px;background:#DC2626;"></div>
    <div style="padding:28px;">
      <p style="margin:0 0 8px;color:#A7B0BD;font-size:12px;letter-spacing:.14em;text-transform:uppercase;">ListingFlow</p>
      <h2 style="margin:0 0 12px;font-size:26px;line-height:1.15;color:#FFFFFF;">Your verification code</h2>
      <p style="margin:0 0 18px;color:#CBD5E1;font-size:15px;line-height:1.6;">Use the code below to verify your identity. It expires shortly.</p>
      <div style="display:inline-block;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:#0B0D10;padding:14px 18px;font-family:Menlo,Consolas,monospace;font-size:24px;letter-spacing:.16em;color:#FFFFFF;">{{ .Token }}</div>
      <p style="margin:22px 0 0;color:#7F8997;font-size:12px;line-height:1.6;">If you did not request this code, secure your account and contact support.</p>
    </div>
  </div>
</div>
